name: dia_organizado
description: Aplicativo de organização pessoal — Dia Organizado
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (banco de dados + autenticação)
  supabase_flutter: ^2.8.0

  # Notificações locais
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # Reconhecimento de voz
  speech_to_text: ^6.6.0

  # Gerenciamento de estado
  provider: ^6.1.2

  # Tipografia do design (Noto Serif / Plus Jakarta Sans / Space Grotesk)
  google_fonts: ^6.2.1

  # Utilitários
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
